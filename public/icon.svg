<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1c1c24"/>

  <!-- Snow peak (white cap) -->
  <polygon points="256,68 308,164 204,164" fill="#f9fafb"/>

  <!-- Left mountain face (amber/gold) -->
  <polygon points="256,68 76,400 256,400" fill="#f59e0b"/>

  <!-- Right mountain face (darker amber) -->
  <polygon points="256,68 436,400 256,400" fill="#d97706"/>

  <!-- Snow shadow -->
  <polygon points="256,68 308,164 256,164" fill="#e5e7eb"/>

  <!-- Horizon line glow -->
  <line x1="76" y1="400" x2="436" y2="400" stroke="#fbbf24" stroke-width="3" opacity="0.5"/>

  <!-- Subtle topographic ring around peak -->
  <ellipse cx="256" cy="164" rx="80" ry="12" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="256" cy="220" rx="120" ry="14" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.18"/>
  <ellipse cx="256" cy="290" rx="155" ry="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.12"/>
</svg>
